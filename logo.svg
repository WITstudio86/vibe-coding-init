<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#ff9f43"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48dbfb"/>
      <stop offset="100%" style="stop-color:#0abde3"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1dd1a1"/>
      <stop offset="100%" style="stop-color:#10ac84"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Connecting lines (pipeline flow) -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="2.5" fill="none" stroke-dasharray="6,4">
    <path d="M125,256 Q180,200 220,210"/>
    <path d="M220,210 Q260,200 292,256"/>
    <path d="M292,256 Q330,200 370,210"/>
    <path d="M370,210 Q410,200 440,256"/>
  </g>

  <!-- Flow arrows -->
  <g fill="rgba(255,255,255,0.35)">
    <polygon points="205,195 218,187 215,198"/>
    <polygon points="275,195 288,187 285,198"/>
    <polygon points="355,195 368,187 365,198"/>
    <polygon points="425,195 438,187 435,198"/>
  </g>

  <!-- Node 1: 需求分析 (red/orange) -->
  <g filter="url(#shadow)">
    <circle cx="105" cy="256" r="48" fill="url(#g1)" opacity="0.95"/>
    <text x="105" y="252" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">需求</text>
    <text x="105" y="268" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">分析</text>
  </g>

  <!-- Node 2: Bug修复 (yellow/amber) -->
  <g filter="url(#shadow)">
    <circle cx="205" cy="195" r="42" fill="url(#g2)" opacity="0.95"/>
    <text x="205" y="191" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Bug</text>
    <text x="205" y="206" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">修复</text>
  </g>

  <!-- Node 3: 技术设计 (cyan/blue) -->
  <g filter="url(#shadow)">
    <circle cx="292" cy="256" r="46" fill="url(#g3)" opacity="0.95"/>
    <text x="292" y="252" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="600">技术</text>
    <text x="292" y="268" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">设计</text>
  </g>

  <!-- Node 4: 代码编写 (green) -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="215" r="44" fill="url(#g4)" opacity="0.95"/>
    <text x="380" y="211" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="600">代码</text>
    <text x="380" y="226" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">编写</text>
  </g>

  <!-- Node 5: 功能验证 (purple) -->
  <g filter="url(#shadow)">
    <circle cx="465" cy="265" r="42" fill="url(#g5)" opacity="0.95"/>
    <text x="465" y="261" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="10" font-weight="600">功能</text>
    <text x="465" y="276" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">验证</text>
  </g>

  <!-- Center glow -->
  <circle cx="290" cy="310" r="60" fill="rgba(255,255,255,0.03)"/>

  <!-- Bottom text: VIBE CODING -->
  <text x="256" y="420" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="36" font-weight="700" letter-spacing="6">VIBE CODING</text>
  <text x="256" y="448" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="16" font-weight="400" letter-spacing="3">多角色协作初始化</text>

  <!-- Small accent dots -->
  <circle cx="80" cy="160" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="460" cy="150" r="2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="440" cy="390" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="90" cy="380" r="2" fill="rgba(255,255,255,0.1)"/>
</svg>
